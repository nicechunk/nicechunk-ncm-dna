<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Gene encoding layout</title>
  <desc id="desc">A diagram showing how NCM DNA packs species, body dimensions, material set, ornament seed, and flags into a compact deterministic gene code.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#080d13"/><stop offset="1" stop-color="#17130c"/></linearGradient>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 40px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}.bit{fill:#101a26;stroke:#2e5063;stroke-width:1}.flag{fill:#17230f;stroke:#5d7f30;stroke-width:1}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="210" cy="590" r="280" fill="#00c2ff" opacity=".07"/><circle cx="1080" cy="112" r="270" fill="#83ff00" opacity=".07"/>
  <text x="70" y="78" class="label">NCM DNA ENCODING</text>
  <text x="70" y="132" class="title">A short code expands into deterministic cuboids.</text>
  <text x="70" y="168" class="copy">The gene packs bounded body parameters, material selection, ornament seed, and feature flags before base62 encoding.</text>
  <g transform="translate(82 248)"><rect class="card" width="232" height="244"/><text x="24" y="42" class="head">Readable gene</text><text x="24" y="80" class="small">species</text><text x="24" y="110" class="small">body dimensions</text><text x="24" y="140" class="small">arm and leg limits</text><text x="24" y="170" class="small">material set</text><text x="24" y="200" class="small">flags</text></g>
  <g transform="translate(374 248)"><rect class="card" width="532" height="244"/><text x="24" y="42" class="head">Packed bit layout</text><g transform="translate(24 78)"><rect class="bit" width="56" height="42"/><rect class="bit" x="60" width="64" height="42"/><rect class="bit" x="128" width="64" height="42"/><rect class="bit" x="196" width="72" height="42"/><rect class="bit" x="272" width="72" height="42"/><rect class="flag" x="348" width="76" height="42"/><rect class="flag" x="428" width="56" height="42"/><text x="10" y="27" class="mono">sp</text><text x="72" y="27" class="mono">body</text><text x="140" y="27" class="mono">head</text><text x="208" y="27" class="mono">limbs</text><text x="284" y="27" class="mono">mat</text><text x="360" y="27" class="mono">seed</text><text x="438" y="27" class="mono">flags</text></g><text x="24" y="166" class="small">Bounded fields keep mutation and search inside valid ranges.</text><text x="24" y="198" class="mono">NCD1.AV.&lt;base62&gt;</text></g>
  <g transform="translate(966 248)"><rect class="card" width="222" height="244"/><text x="24" y="42" class="head">Growth output</text><text x="24" y="80" class="small">normalize</text><text x="24" y="110" class="small">grow cuboids</text><text x="24" y="140" class="small">canonicalize</text><text x="24" y="170" class="small">score or render</text><text x="24" y="204" class="mono">same code, same model</text></g>
  <text x="274" y="628" class="copy">The value of DNA is not randomness; it is a compact replayable recipe with strict deterministic growth rules.</text>
</svg>
